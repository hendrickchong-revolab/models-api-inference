version: "3.8"

services:
  glm-asr-vllm:
    build:
      context: .
    container_name: ${CONTAINER_NAME:-glm-asr-vllm}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID}"]
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
    env_file: .env
    volumes:
      - "~/.cache/huggingface:/root/.cache/huggingface"
    ports:
      - "${PORT}:${PORT}"
    command: vllm serve ${MODEL_NAME} --host 0.0.0.0 --port ${PORT}
    networks:
      - asr-net

networks:
  asr-net:
    external: true
