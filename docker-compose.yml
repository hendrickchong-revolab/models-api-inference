version: "3.8"

services:
  litellm:
    image: litellm/litellm:latest
    container_name: litellm-gateway
    platform: linux/amd64
    entrypoint: ["litellm"]
    command: ["--config", "/app/config.yaml", "--port", "4099"]
    environment:
      - LITELLM_DISABLE_DATABASE=true
      - LITELLM_DISABLE_AUTH=true
      - LITELLM_MASTER_KEY=sk-1234
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:4099/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - asr-net
    depends_on:
      - qwen_asr-srv
  qwen_asr-srv:
    build:
      context: vllm_inference_models/qwen_asr
    container_name: qwen_asr-srv
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:7088/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["2"]
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "7088:7088"
    command: vllm serve Qwen/Qwen3-ASR-1.7B --host 0.0.0.0 --port 7088
    networks:
      - asr-net

  asr-adapter:
    build:
      context: asr_adapter
    container_name: asr-adapter
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./adapter_config.json:/app/adapter_config.json:ro
    ports:
      - "4000:4000"
    depends_on:
      - litellm
    networks:
      - asr-net

networks:
  asr-net:
    external: true
